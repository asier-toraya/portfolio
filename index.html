    <meta charset="UTF-8" />

      name="description"

    <title>Asier | Portfolio</title>
    <link rel="icon" type="image/svg+xml" sizes="any" href="%BASE_URL%favicon.svg?v=2" />
    <link rel="shortcut icon" href="%BASE_URL%favicon.svg?v=2" />
    <script>
      (function (location) {
        if (location.search[1] === "/") {
          const decoded = location.search
            .slice(1)
            .split("&")
            .map((segment) => segment.replace(/~and~/g, "&"))
            .join("?");

          window.history.replaceState(null, "", location.pathname.slice(0, -1) + decoded + location.hash);
        }
      })(window.location);
    </script>

    <div id="root"></div>

  </body>
